<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details — TeamFinder</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <style>
    .details-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--space-6);
      align-items: start;
    }

    .details-hero {
      background: linear-gradient(135deg, rgba(255,122,24,0.06) 0%, rgba(255,61,0,0.03) 100%);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--nav-height) + var(--space-7)) 0 var(--space-7);
    }

    .details-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: var(--space-3);
      line-height: 1.1;
    }

    .details-meta {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .details-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Section */
    .details-section {
      padding: var(--space-6);
    }

    .details-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: var(--space-4);
    }

    .details-desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.8;
      white-space: pre-line;
    }

    /* Skills section */
    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Team members */
    .team-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--border);
    }

    .team-row:last-child { border-bottom: none; }

    .team-info { flex: 1; }
    .team-name { font-size: 0.9rem; font-weight: 600; }
    .team-role { font-size: 0.78rem; color: var(--text-muted); }

    /* Sidebar sticky card */
    .sidebar-sticky {
      position: sticky;
      top: calc(var(--nav-height) + 24px);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .join-card {
      background: linear-gradient(135deg, rgba(255,122,24,0.07) 0%, rgba(255,61,0,0.04) 100%);
      border: 1px solid rgba(255,122,24,0.2);
    }

    .join-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gradient-brand);
    }

    .spots-bar {
      margin: var(--space-4) 0;
    }

    .spots-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .share-wrap {
      display: flex;
      gap: 8px;
    }

    .share-input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.78rem;
      outline: none;
      cursor: text;
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: var(--space-9);
    }

    @media (max-width: 900px) {
      .details-layout { grid-template-columns: 1fr; }
      .sidebar-sticky { position: static; }
    }
  </style>
</head>
<body>

<div class="orb orb-1" style="opacity:0.5;"></div>
<div class="orb orb-2" style="opacity:0.4;"></div>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🚀</div>
      <span class="nav-logo-text"><span class="logo-white">Team</span><span class="logo-orange">Finder</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="find-team.html" class="nav-link" data-page="find-team.html">🔍 Find Teams</a></li>
      <li><a href="create-project.html" class="nav-link" data-page="create-project.html" data-auth="true" style="display:none;">➕ Create Project</a></li>
      <li><a href="dashboard.html" class="nav-link" data-page="dashboard.html" data-auth="true" style="display:none;">📊 Dashboard</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-ghost btn-sm" data-auth="false">Log In</a>
      <a href="login.html" class="btn btn-primary btn-sm" data-auth="false">Get Started</a>
      <div data-auth="true" style="display:flex;align-items:center;gap:10px;">
        <a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
        <div class="avatar nav-user-avatar">?</div>
      </div>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="nav-mobile" id="mobile-menu">
  <a href="find-team.html" class="nav-link">🔍 Find Teams</a>
  <a href="create-project.html" class="nav-link" data-auth="true" style="display:none;">➕ Create Project</a>
  <a href="dashboard.html" class="nav-link" data-auth="true" style="display:none;">📊 Dashboard</a>
  <a href="login.html" class="nav-link" data-auth="false">Log In</a>
</div>

<!-- Dynamic content injected here -->
<div id="page-content"></div>

<script src="app.js"></script>
<script src="src/load-api.js"></script>
<script>
  const projectId = urlParams.get('id');
  const user      = auth.getUser();
  const loggedIn  = auth.isLoggedIn();

  async function renderDetails() {
    let project = null;
    if (projectId) {
      project = projectsDB.getById(projectId); // Fallback for seed
      if (!project) {
        try {
          const apiList = await getProjects();
          const p = apiList.find(x => x.id === projectId);
          if (p) {
            project = {
              id: p.id,
              title: p.title,
              description: p.description,
              category: p.category,
              status: p.status,
              owner: p.created_by,
              ownerInitials: '??',
              skills: p.skills,
              teamSize: p.team_size,
              currentMembers: p.member_count || 1,
              duration: p.duration,
              remote: p.work_style === 'remote',
              createdAt: new Date(p.created_at).getTime()
            };
          }
        } catch (e) {
          console.error(e);
        }
      }
    }

  if (!project) {
    // Not found state
    document.getElementById('page-content').innerHTML = `
      <div class="page-wrap">
        <div class="container">
          <div class="not-found">
            <div style="font-size:4rem;margin-bottom:var(--space-4);">🔍</div>
            <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:var(--space-3);">Project Not Found</h1>
            <p style="color:var(--text-secondary);margin-bottom:var(--space-6);">
              This project doesn't exist or may have been removed.
            </p>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
              <a href="find-team.html" class="btn btn-primary btn-lg">Browse Projects</a>
              <button class="btn btn-secondary btn-lg" onclick="history.back()">← Go Back</button>
            </div>
          </div>
        </div>
      </div>
    `;
  } else {
    const pct = Math.round((project.currentMembers / project.teamSize) * 100);
    const spotsLeft = project.teamSize - project.currentMembers;
    const statusMap = {
      recruiting: { cls: 'badge-success', label: 'Recruiting' },
      active:     { cls: 'badge-warning', label: 'Active' },
      completed:  { cls: 'badge-info',    label: 'Completed' },
    };
    const s = statusMap[project.status] || statusMap.active;
    const postedAgo = timeAgo(project.createdAt);
    const shareUrl = window.location.href;

    // Build mock team members
    const members = [
      { name: project.owner, initials: project.ownerInitials, role: 'Project Lead' },
    ];
    const memberNames = ['Sam K.', 'Jordan L.', 'Riley M.', 'Alex T.', 'Chris W.'];
    for (let i = 1; i < project.currentMembers; i++) {
      const n = memberNames[i - 1] || `Member ${i + 1}`;
      members.push({
        name: n,
        initials: n.slice(0, 2).toUpperCase(),
        role: project.skills[(i - 1) % project.skills.length] + ' Developer',
      });
    }

    const membersHTML = members.map(m => `
      <div class="team-row">
        <div class="avatar avatar-sm">${m.initials}</div>
        <div class="team-info">
          <div class="team-name">${m.name}</div>
          <div class="team-role">${m.role}</div>
        </div>
        <span class="badge badge-success">Active</span>
      </div>
    `).join('');

    const skillsHTML = (project.skills || []).map(s => `<span class="badge">${s}</span>`).join('');

    // Empty slots
    const slotsHTML = Array.from({length: spotsLeft}, () => `
      <div class="team-row" style="opacity:0.4;">
        <div class="avatar avatar-sm" style="background:rgba(255,255,255,0.08);border:1px dashed var(--border);">+</div>
        <div class="team-info">
          <div class="team-name" style="color:var(--text-muted);">Open Position</div>
          <div class="team-role">Waiting for you...</div>
        </div>
        <span class="badge" style="opacity:0.6;">Open</span>
      </div>
    `).join('');

    const joinDisabled = project.status === 'completed' || spotsLeft <= 0;
    const joinLabel = joinDisabled
      ? (project.status === 'completed' ? 'Project Completed' : 'Team Full')
      : (loggedIn ? '🙋 Request to Join' : '🔑 Sign In to Join');

    document.title = `${project.title} — TeamFinder`;

    document.getElementById('page-content').innerHTML = `
      <!-- Hero -->
      <div class="details-hero">
        <div class="container">
          <div style="margin-bottom:var(--space-4);">
            <button class="btn btn-ghost btn-sm" onclick="history.back()" style="display:inline-flex;gap:6px;">← Back</button>
          </div>
          <div style="display:flex;align-items:flex-start;gap:var(--space-5);flex-wrap:wrap;justify-content:space-between;">
            <div style="flex:1;min-width:280px;">
              <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;">
                <span class="badge ${s.cls}">${s.label}</span>
                <span class="badge badge-info">${project.category}</span>
                ${project.remote ? '<span class="badge badge-info">🌍 Remote</span>' : '<span class="badge">📍 On-site</span>'}
              </div>
              <h1 class="details-title">${project.title}</h1>
              <div class="details-meta">
                <div class="details-meta-item">
                  <div class="avatar avatar-sm">${project.ownerInitials}</div>
                  <span>${project.owner}</span>
                </div>
                <div class="details-meta-item">📅 ${postedAgo}</div>
                <div class="details-meta-item">⏱ ${project.duration}</div>
                <div class="details-meta-item">👥 ${project.currentMembers}/${project.teamSize} members</div>
              </div>
            </div>
            <div class="skills-wrap" style="max-width:320px;">${skillsHTML}</div>
          </div>
        </div>
      </div>

      <!-- Main content -->
      <div class="page-wrap" style="padding-top:var(--space-7);">
        <div class="container">
          <div class="details-layout">
            <!-- Left column -->
            <div style="display:flex;flex-direction:column;gap:var(--space-4);">
              <!-- Description -->
              <div class="card details-section">
                <div class="details-section-title">About this project</div>
                <p class="details-desc">${project.description}</p>
              </div>

              <!-- Skills -->
              <div class="card details-section">
                <div class="details-section-title">Tech Stack & Skills Required</div>
                <div class="skills-wrap">${skillsHTML}</div>
              </div>

              <!-- Project Info -->
              <div class="card details-section">
                <div class="details-section-title">Project Details</div>
                <div class="grid-2" style="gap:var(--space-3);">
                  <div style="display:flex;flex-direction:column;gap:4px;">
                    <span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Category</span>
                    <span style="font-size:0.9rem;font-weight:600;">${project.category}</span>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:4px;">
                    <span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Duration</span>
                    <span style="font-size:0.9rem;font-weight:600;">⏱ ${project.duration}</span>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:4px;">
                    <span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Team Size</span>
                    <span style="font-size:0.9rem;font-weight:600;">👥 ${project.teamSize} people</span>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:4px;">
                    <span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;">Work Style</span>
                    <span style="font-size:0.9rem;font-weight:600;">${project.remote ? '🌍 Remote' : '📍 On-site'}</span>
                  </div>
                </div>
              </div>

              <!-- Team -->
              <div class="card details-section">
                <div class="details-section-title">Current Team (${project.currentMembers}/${project.teamSize})</div>
                ${membersHTML}
                ${slotsHTML}
              </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar-sticky">
              <!-- Join card -->
              <div class="card join-card">
                <div style="font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:var(--space-2);">
                  ${spotsLeft > 0 ? `${spotsLeft} spot${spotsLeft > 1 ? 's' : ''} open` : 'Team is full'}
                </div>
                <div style="font-size:0.83rem;color:var(--text-secondary);margin-bottom:var(--space-2);">
                  ${spotsLeft > 0 ? 'Request to join and collaborate with this team.' : 'Follow to get notified if a spot opens.'}
                </div>

                <div class="spots-bar">
                  <div class="spots-text">
                    <span style="color:var(--text-secondary);">${project.currentMembers} joined</span>
                    <span style="color:var(--accent-1);">${spotsLeft} remaining</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${pct}%;"></div>
                  </div>
                </div>

                <button
                  class="btn btn-primary btn-full btn-lg"
                  id="join-btn"
                  ${joinDisabled ? 'disabled' : ''}
                  style="${joinDisabled ? 'opacity:0.5;cursor:not-allowed;' : ''}"
                >
                  ${joinLabel}
                </button>

                ${!loggedIn && !joinDisabled ? `
                  <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:10px;">
                    <a href="login.html" style="color:var(--accent-1);">Create an account</a> to join this project
                  </p>
                ` : ''}
              </div>

              <!-- Owner card -->
              <div class="card" style="padding:var(--space-5);">
                <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:var(--space-3);">Project Lead</div>
                <div style="display:flex;align-items:center;gap:var(--space-3);">
                  <div class="avatar avatar-lg">${project.ownerInitials}</div>
                  <div>
                    <div style="font-weight:700;font-size:0.95rem;">${project.owner}</div>
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;">Project Creator</div>
                  </div>
                </div>
              </div>

              <!-- Share card -->
              <div class="card" style="padding:var(--space-4);">
                <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:var(--space-3);">Share Project</div>
                <div class="share-wrap">
                  <input class="share-input" type="text" value="${shareUrl}" readonly id="share-url-input" />
                  <button class="btn btn-secondary btn-sm" id="copy-link-btn">Copy</button>
                </div>
              </div>

              <!-- Similar projects link -->
              <a href="find-team.html" class="btn btn-ghost btn-full" style="justify-content:center;">
                🔍 Browse Similar Projects
              </a>
            </div>
          </div>
        </div>
      </div>
    `;

    // Join button logic
    document.getElementById('join-btn')?.addEventListener('click', () => {
      if (!loggedIn) {
        window.location.href = PAGES.login + '?redirect=project-details.html?id=' + projectId;
        return;
      }
      const btn = document.getElementById('join-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Sending Request...';
      setTimeout(() => {
        btn.innerHTML = '✅ Request Sent!';
        btn.style.background = 'rgba(16,185,129,0.15)';
        btn.style.color = 'var(--success)';
        btn.style.border = '1px solid rgba(16,185,129,0.3)';
        toast.success('Join request sent! The team lead will review it.');
      }, 900);
    });

    // Copy link
    document.getElementById('copy-link-btn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(shareUrl).then(() => {
        const btn = document.getElementById('copy-link-btn');
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = 'Copy', 2000);
        toast.success('Link copied to clipboard!');
      }).catch(() => {
        const inp = document.getElementById('share-url-input');
        inp.select();
        document.execCommand('copy');
        toast.success('Link copied!');
      });
    });
  }
} // End renderDetails

  // Call init
  renderDetails();
</script>
</body>
</html>
